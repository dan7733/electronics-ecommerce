version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doan4
    volumes:
      - mysql_data:/var/lib/mysql
      - ./doan4.sql:/docker-entrypoint-initdb.d/doan4.sql
    networks:
      - mynetwork

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mynetwork

  backend:
    build:
      context: ./NodeJS
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./NodeJS:/app
      - /app/node_modules
    env_file:
      - ./NodeJS/.env
    depends_on:
      - mysql
      - redis
    networks:
      - mynetwork

  frontend:
    build:
      context: ./reactjs
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:8080"              # Ngoài 8080, Trong 8080
    volumes:
      - ./reactjs:/app           # Quan trọng: Đồng bộ code để Hot Reload
      - /app/node_modules        # Giữ lại node_modules trong container
    environment:
      - PORT=8080                # Chạy port 8080
      - CHOKIDAR_USEPOLLING=true  # Ép Docker quét thay đổi file (rất quan trọng trên Windows)
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=8080      # Giúp trình duyệt kết nối lại khi code thay đổi
    depends_on:
      - backend
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge

volumes:
  mysql_data: